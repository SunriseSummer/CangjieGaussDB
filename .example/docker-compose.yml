services:
  opengauss:
    container_name: opengauss
    image: enmotech/opengauss:3.0.0
    restart: always
    privileged: true
    environment:
      - GS_PASSWORD=Root123456
      - TZ=Asia/Shanghai
    volumes:
      - /data/opengauss:/var/lib/opengauss
    ports:
      - "5432:5432"

